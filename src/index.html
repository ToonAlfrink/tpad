<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>tpad</title>
        <style>
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                height: 100%;
                overflow: hidden;
                background: #0e0e0e;
            }

            textarea {
                width: 100%;
                height: 100%;
                background: #0e0e0e;
                color: #e0e0e0;
                border: none;
                outline: none;
                resize: none;
                padding: 2rem;
                font-family:
                    "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono",
                    monospace;
                font-size: 15px;
                line-height: 1.6;
                tab-size: 4;
            }

            textarea::placeholder {
                color: #444;
            }

            #status {
                position: fixed;
                bottom: 12px;
                right: 16px;
                font-family: sans-serif;
                font-size: 11px;
                color: #555;
                transition: color 0.3s;
            }

            #status.saving {
                color: #887733;
            }
            #status.saved {
                color: #338844;
            }
            #status.error {
                color: #aa3333;
            }
        </style>
    </head>
    <body>
        <textarea
            id="editor"
            placeholder="start typing..."
            autofocus
            spellcheck="false"
        ></textarea>
        <div id="status"></div>

        <script>
            const padId = window.location.pathname.slice(1);
            const editor = document.getElementById("editor");
            const status = document.getElementById("status");
            let saveTimer = null;
            let generation = 0;

            // Load existing content
            fetch(`/api/pad/${padId}`)
                .then((r) => {
                    if (!r.ok) throw new Error("not found");
                    return r.text();
                })
                .then((text) => {
                    editor.value = text;
                })
                .catch(() => {
                    // New pad, start empty
                });

            function setStatus(text, cls) {
                status.textContent = text;
                status.className = cls;
            }

            async function save() {
                const thisGen = ++generation;
                const text = editor.value;
                setStatus("saving...", "saving");

                try {
                    const res = await fetch(`/api/pad/${padId}`, {
                        method: "PUT",
                        headers: { "Content-Type": "text/plain" },
                        body: text,
                    });

                    if (thisGen !== generation) return; // stale save

                    if (res.ok) {
                        setStatus("saved", "saved");
                    } else {
                        setStatus("error saving", "error");
                    }
                } catch {
                    if (thisGen === generation) {
                        setStatus("connection error", "error");
                    }
                }
            }

            editor.addEventListener("input", () => {
                clearTimeout(saveTimer);
                setStatus("", "");
                saveTimer = setTimeout(save, 300);
            });

            // Save on Ctrl+S / Cmd+S
            editor.addEventListener("keydown", (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === "s") {
                    e.preventDefault();
                    clearTimeout(saveTimer);
                    save();
                }
            });
        </script>
    </body>
</html>
